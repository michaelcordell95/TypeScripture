<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeScripture — Verse Search</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/bible.js"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --panel-bg: #161b22;
            --accent: #58a6ff;
            --accent-dim: rgba(88,166,255,0.12);
            --text-main: #c9d1d9;
            --text-muted: #484f58;
            --text-bright: #ffffff;
            --border: #30363d;
            --border-inner: #21262d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 800px;
            margin: 0 auto 32px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-text { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        .logo-text span { color: var(--text-bright); }
        .nav-links { display: flex; gap: 8px; }
        .nav-link {
            color: var(--text-muted);
            font-size: 13px;
            text-decoration: none;
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 6px;
            transition: color 0.15s, border-color 0.15s;
        }
        .nav-link:hover { color: var(--text-main); border-color: var(--accent); }
        .nav-link.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

        /* SEARCH AREA */
        .search-wrap { max-width: 800px; margin: 0 auto 28px; }
        .search-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .search-row { display: flex; gap: 10px; }
        .search-input {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            color: var(--text-bright);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-btn {
            background: var(--accent);
            color: #0d1117;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.15s;
            white-space: nowrap;
        }
        .search-btn:hover { opacity: 0.85; }
        .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* RESULTS INFO BAR */
        .results-meta {
            max-width: 800px;
            margin: 0 auto 14px;
            font-size: 12px;
            color: var(--text-muted);
            min-height: 18px;
        }
        .results-meta strong { color: var(--accent); }

        /* RESULT CARDS */
        .results-list { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

        .verse-card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            transition: border-color 0.15s;
        }
        .verse-card:hover { border-color: #444c56; }

        .verse-body { flex: 1; min-width: 0; }
        .verse-ref {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .verse-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-main);
        }
        .verse-text mark {
            background: rgba(88,166,255,0.2);
            color: var(--text-bright);
            border-radius: 2px;
            padding: 0 1px;
        }

        .type-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .type-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        /* STATES */
        .state-box {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }
        .state-box .icon { font-size: 36px; margin-bottom: 12px; }
        .state-box p { margin-top: 6px; font-size: 13px; }

        .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* LOAD MORE */
        .load-more-wrap { max-width: 800px; margin: 16px auto 0; text-align: center; }
        .load-more-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 28px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.15s, border-color 0.15s;
        }
        .load-more-btn:hover { color: var(--text-main); border-color: var(--accent); }

        @media (max-width: 600px) {
            .search-row { flex-direction: column; }
            .type-btn { align-self: flex-start; margin-top: 10px; }
            .verse-card { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="header">
    <a class="brand" href="/">
        <span style="font-size:40px; line-height:1; color:var(--accent);">✝</span>
        <div class="logo-text">Type<span>Scripture</span></div>
    </a>
    <div class="nav-links">
        <a class="nav-link" href="/">&#127381; Type</a>
        <a class="nav-link" href="/leaderboard.html">&#127942; Leaderboard</a>
        <a class="nav-link" href="/bookmarks.html">&#128278; Bookmarks</a>
        <a class="nav-link active" href="/search.html">&#128269; Search</a>
    </div>
</div>

<div class="search-wrap">
    <div class="search-label">Search Bible Verses</div>
    <div class="search-row">
        <input
            id="search-input"
            class="search-input"
            type="text"
            placeholder="e.g. in the beginning, love one another, fear not..."
            autocomplete="off"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
        />
        <button class="search-btn" id="search-btn" onclick="runSearch()">Search</button>
    </div>
</div>

<div class="results-meta" id="results-meta"></div>
<div id="results-container">
    <div class="state-box">
        <div class="icon">&#128214;</div>
        <div>Search the entire KJV Bible by keyword or phrase</div>
        <p>Results show the verse reference and text with your search term highlighted</p>
    </div>
</div>
<div class="load-more-wrap" id="load-more-wrap" style="display:none;">
    <button class="load-more-btn" onclick="showMore()">Show more results</button>
</div>

<script>
    const SUPABASE_URL = "https://ddubjpmuomforwickzyb.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkdWJqcG11b21mb3J3aWNrenliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTI0ODMsImV4cCI6MjA4ODE2ODQ4M30.wOiDepkS64pRFEpul_sKJ9MIVIVTWzg8BZ1fMTOK3_U";
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { flowType: 'pkce' } });

    const PAGE_SIZE = 20;
    let allResults = [];
    let shownCount = 0;

    // Build flat verse index from KJV_EMBEDDED
    // Format: [{book, chapter, verse, text}, ...]
    let verseIndex = null;

    function buildIndex() {
        if (verseIndex) return;
        verseIndex = [];
        if (typeof KJV_EMBEDDED === 'undefined') return;
        KJV_EMBEDDED.books.forEach(function(b) {
            b.chapters.forEach(function(ch) {
                ch.verses.forEach(function(v) {
                    verseIndex.push({
                        book: b.name,
                        chapter: ch.chapter,
                        verse: v.verse,
                        text: v.text,
                        textLower: v.text.toLowerCase()
                    });
                });
            });
        });
    }

    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function highlightText(text, query) {
        var escaped = escapeRegex(query);
        var regex = new RegExp('(' + escaped + ')', 'gi');
        return text.replace(regex, '<mark>$1</mark>');
    }

    function runSearch() {
        var query = document.getElementById('search-input').value.trim();
        if (!query || query.length < 2) {
            document.getElementById('results-meta').innerHTML = '';
            document.getElementById('results-container').innerHTML =
                '<div class="state-box"><div class="icon">&#9888;&#65039;</div><div>Please enter at least 2 characters</div></div>';
            document.getElementById('load-more-wrap').style.display = 'none';
            return;
        }

        buildIndex();

        if (!verseIndex || verseIndex.length === 0) {
            document.getElementById('results-container').innerHTML =
                '<div class="state-box"><div class="icon">&#128214;</div><div>Bible data not loaded yet. Make sure bible.js is included.</div></div>';
            return;
        }

        document.getElementById('results-container').innerHTML =
            '<div class="state-box"><div class="spinner"></div><div>Searching...</div></div>';
        document.getElementById('results-meta').innerHTML = '';
        document.getElementById('load-more-wrap').style.display = 'none';

        // Run search (synchronous, instant on full bible)
        setTimeout(function() {
            var queryLower = query.toLowerCase();
            allResults = verseIndex.filter(function(v) {
                return v.textLower.indexOf(queryLower) !== -1;
            });

            if (allResults.length === 0) {
                document.getElementById('results-meta').innerHTML = '';
                document.getElementById('results-container').innerHTML =
                    '<div class="state-box"><div class="icon">&#128269;</div><div>No verses found for "<strong style="color:var(--text-main);">' + escapeHtml(query) + '</strong>"</div><p>Try a different word or phrase</p></div>';
                return;
            }

            shownCount = 0;
            var total = allResults.length;
            document.getElementById('results-meta').innerHTML =
                'Found <strong>' + total.toLocaleString() + '</strong> verse' + (total !== 1 ? 's' : '') +
                ' matching "<strong>' + escapeHtml(query) + '</strong>"';

            document.getElementById('results-container').innerHTML = '<div class="results-list" id="results-list"></div>';
            showMore();
        }, 10);
    }

    function showMore() {
        var query = document.getElementById('search-input').value.trim();
        var list = document.getElementById('results-list');
        if (!list) return;

        var batch = allResults.slice(shownCount, shownCount + PAGE_SIZE);
        batch.forEach(function(v) {
            var card = document.createElement('div');
            card.className = 'verse-card';

            var url = '/?book=' + encodeURIComponent(v.book) + '&chapter=' + v.chapter + '&verse=' + v.verse;
            var highlighted = highlightText(escapeHtml(v.text), query);

            card.innerHTML =
                '<div class="verse-body">' +
                    '<div class="verse-ref">' + v.book + ' ' + v.chapter + ':' + v.verse + '</div>' +
                    '<div class="verse-text">' + highlighted + '</div>' +
                '</div>' +
                '<button class="type-btn" onclick="window.location.href=\'' + url + '\'">&#9000; Type It</button>';

            list.appendChild(card);
        });

        shownCount += batch.length;

        if (shownCount < allResults.length) {
            document.getElementById('load-more-wrap').style.display = 'block';
            var remaining = allResults.length - shownCount;
            document.querySelector('.load-more-btn').innerText =
                'Show more (' + remaining.toLocaleString() + ' remaining)';
        } else {
            document.getElementById('load-more-wrap').style.display = 'none';
        }
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Enter key to search
    document.getElementById('search-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') runSearch();
    });
</script>

</body>
</html>
