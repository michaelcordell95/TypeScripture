<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeScripture — Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0d1117; --panel-bg: #161b22; --accent: #58a6ff;
            --text-main: #c9d1d9; --text-muted: #484f58; --text-bright: #ffffff;
            --error: #f85149; --progress-bg: #21262d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 20px; }
        .header { display: flex; align-items: center; justify-content: space-between; max-width: 1000px; margin: 0 auto 24px; }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-icon { width: 38px; height: 38px; border: 3px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: var(--text-bright); background: rgba(88,166,255,0.1); }
        .logo-text { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        .logo-text span { color: var(--text-bright); }
        .back-link { color: var(--text-muted); font-size: 13px; text-decoration: none; border: 1px solid #30363d; padding: 5px 12px; border-radius: 6px; }
        .back-link:hover { color: var(--text-main); border-color: var(--accent); }
        #user-display { color: var(--text-muted); font-size: 12px; }
        .tabs { display: flex; gap: 4px; max-width: 1000px; margin: 0 auto 20px; border-bottom: 1px solid #30363d; }
        .tab { padding: 10px 20px; cursor: pointer; font-size: 14px; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
        .tab:hover { color: var(--text-main); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
        .content { max-width: 1000px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat-card { background: var(--panel-bg); border: 1px solid #30363d; border-radius: 10px; padding: 16px; text-align: center; }
        .stat-card .value { font-size: 26px; font-weight: 800; color: var(--accent); }
        .stat-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-top: 4px; letter-spacing: 0.5px; }
        .browse-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        select { background: #21262d; border: 1px solid #30363d; color: var(--text-main); padding: 8px 12px; border-radius: 6px; font-size: 14px; cursor: pointer; min-width: 140px; }
        select:focus { outline: none; border-color: var(--accent); }
        .lb-panel { background: var(--panel-bg); border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
        .lb-header { padding: 14px 20px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .lb-header h3 { font-size: 14px; color: var(--text-main); font-weight: 600; }
        .lb-header span { font-size: 12px; color: var(--text-muted); }
        .lb-table { width: 100%; border-collapse: collapse; }
        .lb-table th { padding: 10px 20px; text-align: left; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #30363d; }
        .lb-table td { padding: 12px 20px; font-size: 14px; border-bottom: 1px solid #21262d; }
        .lb-table tr:last-child td { border-bottom: none; }
        .lb-table tr:hover td { background: rgba(88,166,255,0.04); }
        .rank { font-weight: 800; color: var(--text-muted); width: 40px; }
        .rank-1 { color: #ffd700; } .rank-2 { color: #c0c0c0; } .rank-3 { color: #cd7f32; }
        .username { font-weight: 600; color: var(--text-main); }
        .username.is-you { color: var(--accent); }
        .username.is-you::after { content: ' (you)'; font-size: 11px; font-weight: 400; color: var(--text-muted); }
        .score-cell { font-weight: 800; color: var(--accent); text-align: right; }
        .wpm-cell { text-align: right; white-space: nowrap; }
        .wpm-val { font-weight: 700; color: var(--text-main); }
        .wpm-label { font-size: 11px; color: var(--text-muted); font-weight: 400; }
        .progress-bar-wrap { width: 120px; background: #21262d; border-radius: 4px; height: 6px; display: inline-block; vertical-align: middle; margin-left: 8px; }
        .progress-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #2ea043, var(--accent)); }
        .empty, .loading { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 14px; }
        @media (max-width: 700px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .header { flex-wrap: wrap; gap: 10px; }
            .progress-bar-wrap { display: none; }
            .lb-table .hide-mobile { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a class="brand" href="/">
            <div class="logo-icon">TS</div>
            <div class="logo-text">Type<span>Scripture</span></div>
        </a>
        <span id="user-display"></span>
        <a class="back-link" href="/">&#8592; Back to Typing</a>
    </div>
    <div class="content">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('bible')">&#128214; Bible Completion</button>
            <button class="tab" onclick="switchTab('scores')">&#127963; Scores</button>
            <button class="tab" onclick="switchTab('personal')">&#128100; My Stats</button>
            <button class="tab" onclick="switchTab('search')">&#128269; Player Search</button>
        </div>

        <!-- SCORES TAB -->
        <div id="tab-scores" style="display:none;">
            <div class="browse-row">
                <select id="scores-book" onchange="onScoresBookChange()">
                    <option value="">&#8212; Select Book &#8212;</option>
                </select>
                <select id="scores-chapter" onchange="onScoresChapterChange()">
                    <option value="">&#8212; Chapter &#8212;</option>
                </select>
                <select id="scores-verse" onchange="onScoresVerseChange()">
                    <option value="">&#8212; Verse &#8212;</option>
                </select>
            </div>
            <div class="lb-panel">
                <div class="lb-header">
                    <h3 id="scores-title">Select a book to see scores</h3>
                    <span id="scores-count"></span>
                </div>
                <div id="scores-personal" style="display:none; padding:10px 20px; font-size:13px; color:var(--text-muted); border-bottom:1px solid #30363d;">
                    <span id="scores-personal-text"></span>
                    <div style="margin-top:6px; background:#21262d; border-radius:4px; height:6px; width:100%;">
                        <div id="scores-personal-bar" style="height:100%; border-radius:4px; background:linear-gradient(90deg,#2ea043,var(--accent)); width:0%; transition:width 0.5s;"></div>
                    </div>
                </div>
                <div id="scores-body"><div class="loading">Select a book above</div></div>
            </div>
        </div>

        <!-- PLAYER SEARCH TAB -->
        <div id="tab-search" style="display:none;">
            <div class="browse-row" style="gap:10px;">
                <input id="search-input" type="text" placeholder="Enter username..." style="background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:8px 14px;border-radius:6px;font-size:14px;min-width:220px;" />
                <button onclick="searchPlayer()" style="background:var(--accent);color:#0d1117;border:none;padding:8px 18px;border-radius:6px;font-weight:700;font-size:14px;cursor:pointer;">Search</button>
            </div>
            <div id="search-result"></div>
        </div>

        <!-- BIBLE COMPLETION TAB -->
        <div id="tab-bible">
            <div class="lb-panel">
                <div class="lb-header">
                    <h3>Global Bible Completion</h3>
                    <span id="bible-lb-count"></span>
                </div>
                <div id="bible-lb-body"><div class="loading">Loading...</div></div>
            </div>
        </div>

        <!-- PERSONAL STATS TAB -->
        <div id="tab-personal" style="display:none;">
            <div id="personal-logged-out" style="display:none;">
                <div class="lb-panel"><div class="empty">Sign in to see your personal stats</div></div>
            </div>
            <div id="personal-content" style="display:none;">
                <div class="stats-grid">
                    <div class="stat-card"><div class="value" id="stat-completion">0%</div><div class="label">Bible Completion</div></div>
                    <div class="stat-card"><div class="value" id="stat-verses">0</div><div class="label">Verses Completed</div></div>
                    <div class="stat-card"><div class="value" id="stat-books">0</div><div class="label">Books Completed</div></div>
                    <div class="stat-card"><div class="value" id="stat-chapters">0</div><div class="label">Chapters Completed</div></div>
                    <div class="stat-card"><div class="value" id="stat-avg">0</div><div class="label">Average WPM</div></div>
                    <div class="stat-card"><div class="value" id="stat-best">0</div><div class="label">Best WPM Ever</div></div>
                </div>
            </div>
        </div>
    </div>

        let currentUserId = null;
        let currentUsername = null;

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUserId = session.user.id;
                const { data } = await supabaseClient.from('profiles').select('username').eq('id', currentUserId).maybeSingle();
                currentUsername = data ? data.username : session.user.email;
                document.getElementById('user-display').innerText = '✓ ' + currentUsername;
            }
        }

        function switchTab(tab) {
            var tabs = document.querySelectorAll('.tab');
            var tabNames = ['bible', 'scores', 'personal', 'search'];
            tabs.forEach(function(t, i) { t.classList.toggle('active', tabNames[i] === tab); });
            document.getElementById('tab-bible').style.display = tab === 'bible' ? 'block' : 'none';
            document.getElementById('tab-scores').style.display = tab === 'scores' ? 'block' : 'none';
            document.getElementById('tab-personal').style.display = tab === 'personal' ? 'block' : 'none';
            document.getElementById('tab-search').style.display = tab === 'search' ? 'block' : 'none';
            if (tab === 'bible') loadBibleCompletionLeaderboard();
            if (tab === 'scores') populateScoresBookSelect();
            if (tab === 'personal') loadPersonalStats();
        }

        // ===== VERSE SCORES TAB =====
        function showPersonalStat(label, done, total) {
            var el = document.getElementById('scores-personal');
            var textEl = document.getElementById('scores-personal-text');
            var barEl = document.getElementById('scores-personal-bar');
            if (!currentUserId || total === 0) { el.style.display = 'none'; return; }
            var pct = (done / total) * 100;
            var displayPct = pct < 0.1 ? pct.toFixed(3) : pct < 1 ? pct.toFixed(2) : Math.round(pct);
            textEl.innerHTML = 'Your completion: <span style="color:var(--accent);font-weight:700;">' + displayPct + '%</span> <span style="font-size:11px;">(' + done + '/' + total + ' ' + label + ')</span>';
            barEl.style.width = Math.max(pct, 0.3) + '%';
            el.style.display = 'block';
        }

        function populateScoresBookSelect() {
            var sel = document.getElementById('scores-book');
            if (sel.options.length > 1) return;
            books.forEach(function(b) {
                var opt = document.createElement('option');
                opt.value = b; opt.innerText = b;
                sel.appendChild(opt);
            });
        }

        function onScoresBookChange() {
            var book = document.getElementById('scores-book').value;
            var chapSel = document.getElementById('scores-chapter');
            var verseSel = document.getElementById('scores-verse');
            chapSel.innerHTML = '<option value="">&#8212; Chapter &#8212;</option>';
            verseSel.innerHTML = '<option value="">&#8212; Verse &#8212;</option>';
            document.getElementById('scores-count').innerText = '';
            if (!book) {
                document.getElementById('scores-title').innerText = 'Select a book to see scores';
                document.getElementById('scores-body').innerHTML = '<div class="loading">Select a book above</div>';
                document.getElementById('scores-personal').style.display = 'none';
                return;
            }
            var count = chapCounts[books.indexOf(book)];
            for (var i = 1; i <= count; i++) {
                var opt = document.createElement('option');
                opt.value = i; opt.innerText = 'Chapter ' + i;
                chapSel.appendChild(opt);
            }
            loadScoresLeaderboard();
        }

        function onScoresChapterChange() {
            var book = document.getElementById('scores-book').value;
            var chap = parseInt(document.getElementById('scores-chapter').value);
            var verseSel = document.getElementById('scores-verse');
            verseSel.innerHTML = '<option value="">&#8212; Verse &#8212;</option>';
            if (!book || !chap) { loadScoresLeaderboard(); return; }
            var count = (verseCounts[book] && verseCounts[book][chap - 1]) || 30;
            for (var i = 1; i <= count; i++) {
                var opt = document.createElement('option');
                opt.value = i; opt.innerText = 'Verse ' + i;
                verseSel.appendChild(opt);
            }
            loadScoresLeaderboard();
        }

        function onScoresVerseChange() {
            loadScoresLeaderboard();
        }

        async function loadScoresLeaderboard() {
            var book = document.getElementById('scores-book').value;
            var chap = parseInt(document.getElementById('scores-chapter').value) || 0;
            var verse = parseInt(document.getElementById('scores-verse').value) || 0;
            if (!book) return;

            document.getElementById('scores-body').innerHTML = '<div class="loading">Loading scores...</div>';
            document.getElementById('scores-count').innerText = '';

            try {
                if (verse && chap) {
                    document.getElementById('scores-title').innerText = book + ' ' + chap + ':' + verse;
                    document.getElementById('scores-personal').style.display = 'none';
                    var result = await supabaseClient
                        .from('verse_progress')
                        .select('user_id, best_wpm')
                        .eq('book_name', book).eq('chapter_num', chap).eq('verse_num', verse)
                        .gt('best_wpm', 0).order('best_wpm', { ascending: false }).limit(50);
                    if (result.error) throw result.error;
                    var data = result.data || [];
                    if (data.length === 0) {
                        document.getElementById('scores-body').innerHTML = '<div class="empty">No scores yet &#8212; be the first!</div>';
                        return;
                    }
                    var userIds = data.map(function(r) { return r.user_id; });
                    var profResult = await supabaseClient.from('profiles').select('id, username').in('id', userIds);
                    var usernameMap = {};
                    (profResult.data || []).forEach(function(p) { usernameMap[p.id] = p.username; });
                    document.getElementById('scores-count').innerText = data.length + ' score' + (data.length !== 1 ? 's' : '');
                    var rows = data.map(function(row, i) {
                        var rank = i + 1;
                        var rankClass = rank <= 3 ? 'rank-' + rank : '';
                        var medal = rank === 1 ? '&#129351;' : rank === 2 ? '&#129352;' : rank === 3 ? '&#129353;' : rank;
                        var username = usernameMap[row.user_id] || 'Anonymous';
                        var isYou = row.user_id === currentUserId;
                        return '<tr><td class="rank ' + rankClass + '">' + medal + '</td><td class="username' + (isYou ? ' is-you' : '') + '">' + username + '</td><td class="score-cell">' + row.best_wpm + ' <span style="font-size:11px;color:var(--text-muted);font-weight:400;">WPM</span></td></tr>';
                    }).join('');
                    document.getElementById('scores-body').innerHTML = '<table class="lb-table"><thead><tr><th>#</th><th>Player</th><th style="text-align:right;">Best WPM</th></tr></thead><tbody>' + rows + '</tbody></table>';

                } else if (chap) {
                    document.getElementById('scores-title').innerText = book + ' — Chapter ' + chap;
                    var chapVerseTotal = (verseCounts[book] && verseCounts[book][chap - 1]) || 0;
                    var result = await supabaseClient
                        .from('verse_progress')
                        .select('user_id, best_wpm')
                        .eq('book_name', book).eq('chapter_num', chap);
                    if (result.error) throw result.error;
                    var userData = {};
                    (result.data || []).forEach(function(r) {
                        if (!userData[r.user_id]) userData[r.user_id] = { count: 0, totalWpm: 0, scoredVerses: 0 };
                        userData[r.user_id].count++;
                        if (r.best_wpm > 0) { userData[r.user_id].totalWpm += r.best_wpm; userData[r.user_id].scoredVerses++; }
                    });
                    var completers = Object.keys(userData).filter(function(uid) { return userData[uid].count >= chapVerseTotal; });
                    var myCount = currentUserId && userData[currentUserId] ? userData[currentUserId].count : 0;
                    showPersonalStat('verses', myCount, chapVerseTotal);
                    if (completers.length === 0) {
                        document.getElementById('scores-body').innerHTML = '<div class="empty">Nobody has completed 100% of this chapter yet &#8212; be the first!</div>';
                        return;
                    }
                    completers.sort(function(a, b) {
                        var avgA = userData[a].scoredVerses > 0 ? userData[a].totalWpm / userData[a].scoredVerses : 0;
                        var avgB = userData[b].scoredVerses > 0 ? userData[b].totalWpm / userData[b].scoredVerses : 0;
                        return avgB - avgA;
                    });
                    completers = completers.slice(0, 50);
                    var profResult = await supabaseClient.from('profiles').select('id, username').in('id', completers);
                    var usernameMap = {};
                    (profResult.data || []).forEach(function(p) { usernameMap[p.id] = p.username; });
                    document.getElementById('scores-count').innerText = completers.length + ' completion' + (completers.length !== 1 ? 's' : '');
                    var rows = completers.map(function(userId, i) {
                        var rank = i + 1;
                        var rankClass = rank <= 3 ? 'rank-' + rank : '';
                        var medal = rank === 1 ? '&#129351;' : rank === 2 ? '&#129352;' : rank === 3 ? '&#129353;' : rank;
                        var username = usernameMap[userId] || 'Anonymous';
                        var isYou = userId === currentUserId;
                        var avg = userData[userId].scoredVerses > 0 ? Math.round(userData[userId].totalWpm / userData[userId].scoredVerses) : 0;
                        return '<tr><td class="rank ' + rankClass + '">' + medal + '</td><td class="username' + (isYou ? ' is-you' : '') + '">' + username + '</td><td class="score-cell">' + avg + ' <span style="font-size:11px;color:var(--text-muted);font-weight:400;">avg WPM</span></td></tr>';
                    }).join('');
                    document.getElementById('scores-body').innerHTML = '<table class="lb-table"><thead><tr><th>#</th><th>Player</th><th style="text-align:right;">Avg WPM</th></tr></thead><tbody>' + rows + '</tbody></table>';

                } else {
                    document.getElementById('scores-title').innerText = book;
                    var bookVerseTotal = (verseCounts[book] || []).reduce(function(sum, v) { return sum + v; }, 0);
                    var result = await supabaseClient
                        .from('verse_progress')
                        .select('user_id, best_wpm')
                        .eq('book_name', book);
                    if (result.error) throw result.error;
                    var userData = {};
                    (result.data || []).forEach(function(r) {
                        if (!userData[r.user_id]) userData[r.user_id] = { count: 0, totalWpm: 0, scoredVerses: 0 };
                        userData[r.user_id].count++;
                        if (r.best_wpm > 0) { userData[r.user_id].totalWpm += r.best_wpm; userData[r.user_id].scoredVerses++; }
                    });
                    var completers = Object.keys(userData).filter(function(uid) { return userData[uid].count >= bookVerseTotal; });
                    var myCount = currentUserId && userData[currentUserId] ? userData[currentUserId].count : 0;
                    showPersonalStat('verses', myCount, bookVerseTotal);
                    if (completers.length === 0) {
                        document.getElementById('scores-body').innerHTML = '<div class="empty">Nobody has completed 100% of ' + book + ' yet &#8212; be the first!</div>';
                        return;
                    }
                    completers.sort(function(a, b) {
                        var avgA = userData[a].scoredVerses > 0 ? userData[a].totalWpm / userData[a].scoredVerses : 0;
                        var avgB = userData[b].scoredVerses > 0 ? userData[b].totalWpm / userData[b].scoredVerses : 0;
                        return avgB - avgA;
                    });
                    completers = completers.slice(0, 50);
                    var profResult = await supabaseClient.from('profiles').select('id, username').in('id', completers);
                    var usernameMap = {};
                    (profResult.data || []).forEach(function(p) { usernameMap[p.id] = p.username; });
                    document.getElementById('scores-count').innerText = completers.length + ' completion' + (completers.length !== 1 ? 's' : '');
                    var rows = completers.map(function(userId, i) {
                        var rank = i + 1;
                        var rankClass = rank <= 3 ? 'rank-' + rank : '';
                        var medal = rank === 1 ? '&#129351;' : rank === 2 ? '&#129352;' : rank === 3 ? '&#129353;' : rank;
                        var username = usernameMap[userId] || 'Anonymous';
                        var isYou = userId === currentUserId;
                        var avg = userData[userId].scoredVerses > 0 ? Math.round(userData[userId].totalWpm / userData[userId].scoredVerses) : 0;
                        return '<tr><td class="rank ' + rankClass + '">' + medal + '</td><td class="username' + (isYou ? ' is-you' : '') + '">' + username + '</td><td class="score-cell">' + avg + ' <span style="font-size:11px;color:var(--text-muted);font-weight:400;">avg WPM</span></td></tr>';
                    }).join('');
                    document.getElementById('scores-body').innerHTML = '<table class="lb-table"><thead><tr><th>#</th><th>Player</th><th style="text-align:right;">Avg WPM</th></tr></thead><tbody>' + rows + '</tbody></table>';
                }
            } catch(err) {
                console.error('Scores leaderboard error:', err);
                document.getElementById('scores-body').innerHTML = '<div class="empty">Error loading scores.</div>';
            }
        }

        // ===== BIBLE COMPLETION TAB =====
        async function loadBibleCompletionLeaderboard() {
            document.getElementById('bible-lb-body').innerHTML = '<div class="loading">Loading...</div>';

            try {
                // Fetch completed verses WITH wpm data in one query
                var result = await supabaseClient
                    .from('verse_progress')
                    .select('user_id, best_wpm')
                    .eq('completed', true);

                if (result.error) throw result.error;

                // Aggregate per user: verse count, total wpm, best wpm
                var userData = {};
                (result.data || []).forEach(function(r) {
                    if (!userData[r.user_id]) {
                        userData[r.user_id] = { verseCount: 0, totalWpm: 0, scoredVerses: 0, bestWpm: 0 };
                    }
                    userData[r.user_id].verseCount++;
                    if (r.best_wpm > 0) {
                        userData[r.user_id].totalWpm += r.best_wpm;
                        userData[r.user_id].scoredVerses++;
                        if (r.best_wpm > userData[r.user_id].bestWpm) {
                            userData[r.user_id].bestWpm = r.best_wpm;
                        }
                    }
                });

                if (Object.keys(userData).length === 0) {
                    document.getElementById('bible-lb-count').innerText = '';
                    document.getElementById('bible-lb-body').innerHTML = '<div class="empty">No completions yet &#8212; be the first!</div>';
                    return;
                }

                // Sort by verse count descending
                var sorted = Object.keys(userData).sort(function(a, b) {
                    return userData[b].verseCount - userData[a].verseCount;
                }).slice(0, 50);

                // Fetch usernames
                var profResult = await supabaseClient.from('profiles').select('id, username').in('id', sorted);
                var usernameMap = {};
                (profResult.data || []).forEach(function(p) { usernameMap[p.id] = p.username; });

                document.getElementById('bible-lb-count').innerText = sorted.length + ' player' + (sorted.length !== 1 ? 's' : '');

                var rows = sorted.map(function(userId, i) {
                    var rank = i + 1;
                    var u = userData[userId];
                    var username = usernameMap[userId] || 'Anonymous';
                    var isYou = userId === currentUserId;
                    var verseCount = u.verseCount;
                    var pct = (verseCount / TOTAL_VERSES_BIBLE) * 100;
                    var displayPct = pct < 0.1 ? pct.toFixed(3) + '%' : pct < 1 ? pct.toFixed(2) + '%' : Math.round(pct) + '%';
                    var barWidth = Math.max((verseCount / TOTAL_VERSES_BIBLE) * 100, 0.5);
                    var rankClass = rank <= 3 ? 'rank-' + rank : '';
                    var medal = rank === 1 ? '&#129351;' : rank === 2 ? '&#129352;' : rank === 3 ? '&#129353;' : rank;
                    var avgWpm = u.scoredVerses > 0 ? Math.round(u.totalWpm / u.scoredVerses) : 0;
                    var bestWpm = u.bestWpm || 0;
                    var avgCell = avgWpm > 0
                        ? '<span class="wpm-val">' + avgWpm + '</span> <span class="wpm-label">WPM</span>'
                        : '<span class="wpm-label">—</span>';
                    var bestCell = bestWpm > 0
                        ? '<span class="wpm-val">' + bestWpm + '</span> <span class="wpm-label">WPM</span>'
                        : '<span class="wpm-label">—</span>';
                    return '<tr>' +
                        '<td class="rank ' + rankClass + '">' + medal + '</td>' +
                        '<td class="username' + (isYou ? ' is-you' : '') + '">' + username + '</td>' +
                        '<td style="text-align:right;">' +
                            '<span style="font-weight:800;color:var(--accent);">' + displayPct + '</span>' +
                            '<span style="color:var(--text-muted);font-size:11px;"> (' + verseCount.toLocaleString() + ')</span>' +
                            '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + barWidth + '%"></div></div>' +
                        '</td>' +
                        '<td class="wpm-cell hide-mobile">' + avgCell + '</td>' +
                        '<td class="wpm-cell hide-mobile">' + bestCell + '</td>' +
                    '</tr>';
                }).join('');

                document.getElementById('bible-lb-body').innerHTML =
                    '<table class="lb-table">' +
                        '<thead><tr>' +
                            '<th>#</th>' +
                            '<th>Player</th>' +
                            '<th style="text-align:right;">Completion</th>' +
                            '<th class="hide-mobile" style="text-align:right;">Avg WPM</th>' +
                            '<th class="hide-mobile" style="text-align:right;">Best WPM</th>' +
                        '</tr></thead>' +
                        '<tbody>' + rows + '</tbody>' +
                    '</table>';

            } catch(err) {
                console.error('Bible completion error:', err);
                document.getElementById('bible-lb-body').innerHTML = '<div class="empty">Error loading leaderboard.</div>';
            }
        }

        // ===== PERSONAL STATS TAB =====
        async function loadPersonalStats() {
            if (!currentUserId) {
                document.getElementById('personal-logged-out').style.display = 'block';
                document.getElementById('personal-content').style.display = 'none';
                return;
            }
            document.getElementById('personal-logged-out').style.display = 'none';
            document.getElementById('personal-content').style.display = 'block';

            try {
                var result = await supabaseClient
                    .from('verse_progress')
                    .select('book_name, chapter_num, verse_num, best_wpm')
                    .eq('user_id', currentUserId);

                if (result.error) throw result.error;
                var completed = result.data || [];
                var withScore = completed.filter(function(r) { return r.best_wpm > 0; });
                var totalWpm = withScore.reduce(function(sum, r) { return sum + r.best_wpm; }, 0);
                var avgWpm = withScore.length > 0 ? Math.round(totalWpm / withScore.length) : 0;
                var bestWpm = withScore.length > 0 ? Math.max.apply(null, withScore.map(function(r) { return r.best_wpm; })) : 0;
                var pct = (completed.length / TOTAL_VERSES_BIBLE) * 100;
                var displayPct = pct < 0.1 ? pct.toFixed(3) + '%' : pct < 1 ? pct.toFixed(2) + '%' : Math.round(pct) + '%';

                var completedKeys = {};
                completed.forEach(function(r) {
                    var key = r.book_name + '|' + r.chapter_num + '|' + r.verse_num;
                    completedKeys[key] = true;
                });

                var booksCompleted = books.filter(function(book) {
                    var chapters = verseCounts[book];
                    if (!chapters) return false;
                    for (var c = 0; c < chapters.length; c++) {
                        for (var v = 1; v <= chapters[c]; v++) {
                            if (!completedKeys[book + '|' + (c + 1) + '|' + v]) return false;
                        }
                    }
                    return true;
                }).length;

                var chaptersCompleted = 0;
                books.forEach(function(book) {
                    var chapters = verseCounts[book];
                    if (!chapters) return;
                    for (var c = 0; c < chapters.length; c++) {
                        var chapNum = c + 1;
                        var allDone = true;
                        for (var v = 1; v <= chapters[c]; v++) {
                            if (!completedKeys[book + '|' + chapNum + '|' + v]) { allDone = false; break; }
                        }
                        if (allDone) chaptersCompleted++;
                    }
                });

                document.getElementById('stat-completion').innerText = displayPct;
                document.getElementById('stat-verses').innerText = completed.length.toLocaleString();
                document.getElementById('stat-books').innerText = booksCompleted + ' / 66';
                document.getElementById('stat-chapters').innerText = chaptersCompleted + ' / 1189';
                document.getElementById('stat-avg').innerText = avgWpm;
                document.getElementById('stat-best').innerText = bestWpm;

            } catch(err) {
                console.error('Personal stats error:', err);
            }
        }

        async function searchPlayer() {
            var username = document.getElementById('search-input').value.trim();
            var resultEl = document.getElementById('search-result');
            if (!username) return;
            resultEl.innerHTML = '<div class="loading">Searching...</div>';

            var profResult = await supabaseClient.from('profiles').select('id, username').ilike('username', username).limit(1);
            if (profResult.error || !profResult.data || profResult.data.length === 0) {
                resultEl.innerHTML = '<div class="empty">No player found with that username.</div>';
                return;
            }
            var profile = profResult.data[0];
            var uid = profile.id;

            var result = await supabaseClient.from('verse_progress').select('book_name, chapter_num, verse_num, best_wpm').eq('user_id', uid);
            if (result.error) { resultEl.innerHTML = '<div class="empty">Error loading stats.</div>'; return; }

            var rows = result.data || [];
            var withWpm = rows.filter(function(r) { return r.best_wpm > 0; });
            var totalWpm = withWpm.reduce(function(s, r) { return s + r.best_wpm; }, 0);
            var avgWpm = withWpm.length > 0 ? Math.round(totalWpm / withWpm.length) : 0;
            var bestWpm = withWpm.length > 0 ? Math.max.apply(null, withWpm.map(function(r) { return r.best_wpm; })) : 0;
            var pct = (rows.length / TOTAL_VERSES_BIBLE) * 100;
            var displayPct = pct < 0.1 ? pct.toFixed(3) + '%' : pct < 1 ? pct.toFixed(2) + '%' : Math.round(pct) + '%';

            var completedKeys = {};
            rows.forEach(function(r) { completedKeys[r.book_name + '|' + r.chapter_num + '|' + r.verse_num] = true; });
            var booksCompleted = books.filter(function(book) {
                var chapters = verseCounts[book]; if (!chapters) return false;
                for (var c = 0; c < chapters.length; c++) for (var v = 1; v <= chapters[c]; v++) if (!completedKeys[book + '|' + (c+1) + '|' + v]) return false;
                return true;
            }).length;
            var chaptersCompleted = 0;
            books.forEach(function(book) {
                var chapters = verseCounts[book]; if (!chapters) return;
                for (var c = 0; c < chapters.length; c++) {
                    var allDone = true;
                    for (var v = 1; v <= chapters[c]; v++) { if (!completedKeys[book + '|' + (c+1) + '|' + v]) { allDone = false; break; } }
                    if (allDone) chaptersCompleted++;
                }
            });

            var isYou = uid === currentUserId;
            resultEl.innerHTML =
                '<div style="padding:16px 20px;border-bottom:1px solid #30363d;">' +
                    '<span style="font-size:16px;font-weight:800;color:var(--accent);">' + profile.username + '</span>' +
                    (isYou ? ' <span style="font-size:11px;color:var(--text-muted);">(you)</span>' : '') +
                '</div>' +
                '<div class="stats-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#30363d;">' +
                    '<div class="stat-card" style="background:var(--panel-bg);padding:20px;text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--accent);">' + displayPct + '</div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;margin-top:4px;">Bible Completion</div></div>' +
                    '<div class="stat-card" style="background:var(--panel-bg);padding:20px;text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--accent);">' + rows.length.toLocaleString() + '</div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;margin-top:4px;">Verses Typed</div></div>' +
                    '<div class="stat-card" style="background:var(--panel-bg);padding:20px;text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--accent);">' + booksCompleted + ' / 66</div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;margin-top:4px;">Books Complete</div></div>' +
                    '<div class="stat-card" style="background:var(--panel-bg);padding:20px;text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--accent);">' + chaptersCompleted + ' / 1189</div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;margin-top:4px;">Chapters Complete</div></div>' +
                    '<div class="stat-card" style="background:var(--panel-bg);padding:20px;text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--accent);">' + avgWpm + '</div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;margin-top:4px;">Avg WPM</div></div>' +
                    '<div class="stat-card" style="background:var(--panel-bg);padding:20px;text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--accent);">' + bestWpm + '</div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;margin-top:4px;">Best WPM</div></div>' +
                '</div>';
        }

        document.getElementById('search-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') searchPlayer(); });

        init().then(function() { loadBibleCompletionLeaderboard(); });
    </script>
