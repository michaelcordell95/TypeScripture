<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>TypeScripture</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --panel-bg: #161b22;
            --accent: #58a6ff;
            --text-main: #c9d1d9;
            --text-muted: #484f58;
            --text-bright: #ffffff;
            --error: #f85149;
            --correct: #f0f6fc;
            --progress-bg: #21262d;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .brand-container { display: flex; align-items: center; gap: 15px; margin-top: 1vh; margin-bottom: 1vh; }
        .logo-icon { width: 58px; height: 58px; border: 3px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 26px; color: var(--text-bright); background: rgba(88, 166, 255, 0.1); box-shadow: 0 0 15px rgba(88, 166, 255, 0.2); }
        .logo-text { font-size: clamp(30px, 5vw, 44px); font-weight: 800; color: var(--accent); letter-spacing: -1.5px; }
        .logo-text span { color: var(--text-bright); }
        #auth-container { margin-bottom: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; align-items: center; }
        #auth-container { margin-bottom: 0; }
        #google-login-btn { display: flex; align-items: center; gap: 6px; background: #21262d; color: var(--text-muted); font-weight: 500; border: 1px solid #30363d; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        #google-login-btn:hover { border-color: var(--accent); color: var(--text-main); }
        #google-login-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
        #logout-btn { background: transparent; color: var(--text-muted); display: none; border: 1px solid #30363d; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        #logout-btn:hover { border-color: var(--error); color: var(--error); }
        #user-email { color: var(--text-muted); align-self: center; font-size: 12px; }
        #bible-progress-container { width: 90%; max-width: 900px; background: var(--progress-bg); height: 8px; border-radius: 10px; margin-bottom: 5px; border: 1px solid #30363d; }
        #bible-progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #2ea043, var(--accent)); transition: width 0.5s ease-out; }
        #progress-text { font-size: 11px; color: var(--text-muted); margin-bottom: 1vh; font-weight: bold; }
        #nav-header { background: var(--panel-bg); padding: 12px 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 1.5vh; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; }
        .nav-group { display: flex; align-items: center; gap: 8px; }
        .settings-group { border-left: 1px solid #30363d; padding-left: 15px; display: flex; gap: 15px; font-size: 13px; color: var(--text-muted); }
        .settings-group label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        select, button { background: #21262d; border: 1px solid #30363d; color: var(--text-main); padding: 8px 12px; border-radius: 6px; font-size: 14px; cursor: pointer; }
        #stats-bar { display: flex; gap: 12px; margin-bottom: 1.5vh; justify-content: center; }
        .stat-box { text-align: center; background: var(--panel-bg); padding: 10px 15px; border-radius: 8px; border: 1px solid #30363d; min-width: 85px; }
        .stat-value { font-size: 22px; font-weight: bold; color: var(--accent); display: block; }
        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        #display { width: 92%; max-width: 1100px; height: 45vh; font-size: clamp(24px, 3.5vh, 42px); line-height: 1.5; text-align: left; padding: 35px; background: var(--panel-bg); border-radius: 16px; border: 1px solid #30363d; overflow-y: auto; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        span { color: var(--text-muted); white-space: pre-wrap; word-wrap: break-word; }
        .current-char { border-left: 3px solid var(--accent); animation: blink 1s infinite; background: rgba(88, 166, 255, 0.1); }
        @keyframes blink { 50% { border-color: transparent; } }
        .correct { color: var(--correct) !important; }
        .incorrect { color: var(--error) !important; background: rgba(248, 81, 73, 0.1); text-decoration: underline; }
        #hidden-input { position: fixed; bottom: 0; left: 0; width: 100%; height: 44px; opacity: 0.001; font-size: 16px; border: none; background: transparent; color: transparent; caret-color: transparent; z-index: 50; }
        #display::-webkit-scrollbar { width: 8px; }
        #display::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        .complete-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 18px; text-align: center; }
        .complete-screen .emoji { font-size: 2.5em; }
        .complete-screen h2 { color: var(--accent); font-size: 1.4em; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
        .complete-screen .avg { color: var(--text-main); font-size: 1em; }
        .complete-screen .avg strong { color: var(--accent); font-size: 1.2em; }
        #reset-btn, #next-verse-btn { background: transparent; border: 1px solid #30363d; color: var(--text-muted); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 16px; line-height: 1; }
        #reset-btn:hover, #next-verse-btn:hover { border-color: var(--accent); color: var(--accent); }
        #bookmark-btn { background: transparent; border: 1px solid #30363d; color: var(--text-muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        #bookmark-btn:hover { border-color: #f0b429; color: #f0b429; }
        #bookmark-btn.bookmarked { border-color: #f0b429; color: #f0b429; }
        .next-btn { padding: 12px 32px; font-size: 1em; background: var(--accent); color: var(--bg-dark); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 6px; }
        .next-btn:hover { opacity: 0.85; }
        #last-verse-box {
            font-size: 12px;
            color: var(--text-main);
            background: var(--panel-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 5px 14px;
            margin-bottom: 1vh;
            min-height: 0;
            display: none;
        }
        #last-verse-box span { color: var(--accent); font-weight: 700; }
        #last-verse-box .new-best { color: #2ea043; font-weight: 700; }
        #accuracy-warning {
            font-size: 13px;
            color: var(--error);
            font-weight: bold;
            min-height: 18px;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
            transition: opacity 0.3s;
        }
        #username-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center; }
        #username-modal.active { display: flex; }
        #username-modal-box { background: var(--panel-bg); border: 1px solid #30363d; border-radius: 16px; padding: 36px 40px; max-width: 380px; width: 90%; display: flex; flex-direction: column; gap: 14px; text-align: center; }
        #username-modal-box h2 { color: var(--accent); margin: 0; font-size: 1.3em; }
        #username-modal-box p { color: var(--text-muted); margin: 0; font-size: 13px; }
        #username-input { padding: 10px 14px; border-radius: 8px; border: 1px solid #30363d; background: #21262d; color: var(--text-main); font-size: 15px; text-align: center; width: 100%; box-sizing: border-box; }
        #username-input::placeholder { color: var(--text-muted); }
        #username-error { color: var(--error); font-size: 12px; min-height: 16px; }
        #save-username-btn { background: var(--accent); color: var(--bg-dark); font-weight: bold; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 15px; }

        /* ═══════════════════════════════
           MOBILE RESPONSIVE STYLES
           ═══════════════════════════════ */
        :root { color-scheme: dark; }

        select option { background: #1c2128; color: #c9d1d9; }

        @media (max-width: 600px) {
            body { padding: 8px; overflow-y: auto; }

            /* Header: stack items, remove absolute positioning */
            .brand-container {
                position: static !important;
                width: 96% !important;
                flex-wrap: wrap;
                gap: 8px;
                justify-content: center;
            }
            .brand-container > a {
                position: static !important;
                font-size: 11px;
                order: -1;
                align-self: flex-start;
            }
            #auth-container {
                position: static !important;
                margin: 0 !important;
                align-self: flex-end;
            }

            /* Nav: stack selects */
            #nav-header { width: 96%; padding: 10px; gap: 8px; }
            .nav-group { flex-wrap: wrap; justify-content: center; }
            .settings-group { border-left: none; padding-left: 0; border-top: 1px solid #30363d; padding-top: 8px; justify-content: center; }
            select { font-size: 13px; max-width: 90px; }

            /* Stats — stick to top so keyboard can't push them off screen */
            #stats-bar {
                width: 96%;
                gap: 6px;
                position: sticky;
                top: 4px;
                z-index: 10;
                background: var(--bg-dark);
                padding: 4px 0;
            }
            .stat-box { min-width: 0; flex: 1; padding: 8px 6px; }
            .stat-value { font-size: 18px; }

            /* Last verse box also sticky */
            #last-verse-box {
                position: sticky;
                top: 72px;
                z-index: 10;
                background: var(--panel-bg);
            }

            /* Display */
            #display {
                width: 96%;
                height: clamp(140px, 28vh, 260px);
                font-size: clamp(18px, 5.5vw, 26px);
                padding: 14px;
            }

            #bible-progress-container { width: 96%; }
        }
    </style>
</head>
<body>
    <div class="brand-container" style="width:90%; max-width:900px; justify-content:center; flex-direction:column; align-items:center; gap:8px;">
        <div style="display:flex; align-items:center; gap:12px;">
           <span style="font-size:52px; line-height:1; color:var(--accent);">✝</span>
            <div class="logo-text">Type<span>Scripture</span></div>
        </div>
        <div style="display:flex; align-items:center; gap:10px; justify-content:center; flex-wrap:wrap;">
            <a href="/leaderboard.html" style="color:var(--text-muted); font-size:12px; text-decoration:none; border:1px solid #30363d; padding:5px 10px; border-radius:6px;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--text-main)'" onmouseout="this.style.borderColor='#30363d';this.style.color='var(--text-muted)'">🏆 Leaderboard</a>
            <a href="/bookmarks.html" style="color:var(--text-muted); font-size:12px; text-decoration:none; border:1px solid #30363d; padding:5px 10px; border-radius:6px;" onmouseover="this.style.borderColor='#f0b429';this.style.color='#f0b429'" onmouseout="this.style.borderColor='#30363d';this.style.color='var(--text-muted)'">⭐ Bookmarks</a>
            <a href="/search.html" style="color:var(--text-muted); font-size:12px; text-decoration:none; border:1px solid #30363d; padding:5px 10px; border-radius:6px;" onmouseover="this.style.borderColor='#58a6ff';this.style.color='#58a6ff'" onmouseout="this.style.borderColor='#30363d';this.style.color='var(--text-muted)'">🔍 Search</a>
            <div id="auth-container" style="margin:0; display:flex; gap:8px; align-items:center;">
                <button id="google-login-btn" onclick="handleGoogleLogin()">
                    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    Sign in
                </button>
                <button id="logout-btn" onclick="handleLogout()">Logout</button>
                <span id="user-email"></span>
            </div>
        </div>
    </div>

    <div id="username-modal">
        <div id="username-modal-box">
            <h2>Choose a Username</h2>
            <p>This is how you'll appear on leaderboards. No email shown.</p>
            <input type="text" id="username-input" placeholder="e.g. ScriptureSpeed42" maxlength="20" autocomplete="off">
            <div id="username-error"></div>
            <button id="save-username-btn" onclick="saveUsername()">Save Username</button>
        </div>
    </div>

    <div id="bible-progress-container"><div id="bible-progress-fill"></div></div>
    <div id="progress-text">Bible Completion: 0%</div>
    <div id="nav-header">
        <div class="nav-group">
            <select id="book-select" onchange="updateChapters(true)"></select>
            <select id="chapter-select" onchange="updateVerses(true)"></select>
            <select id="verse-select" onchange="fetchVerses()"></select>
            <button id="reset-btn" onclick="loadVerse()" title="Restart verse">🔙</button>
            <button id="next-verse-btn" onclick="goToNextVerse()" title="Next verse">👉</button>
            <button id="bookmark-btn" onclick="toggleBookmark()" title="Bookmark this verse">⭐</button>
        </div>
        <div class="settings-group">
            <label><input type="checkbox" id="easy-mode" checked> Easy Mode</label>
            <label><input type="checkbox" id="repeat-mode"> Repeat</label>
        </div>
    </div>
    <div id="stats-bar">
        <div class="stat-box"><span class="stat-value" id="wpm">0</span><span class="stat-label">WPM</span></div>
        <div class="stat-box"><span class="stat-value" id="verse-best-display">0</span><span class="stat-label">Best</span></div>
        <div class="stat-box"><span class="stat-value"><span id="accuracy">100</span>%</span><span class="stat-label">Acc</span></div>
        <div class="stat-box"><span class="stat-value" id="progress">0/0</span><span class="stat-label">Verse</span></div>
    </div>
    <div id="last-verse-box"></div>
    <div id="accuracy-warning"></div>
    <div id="display"></div>
    <input type="text" id="hidden-input" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none">

    <script src="/bible.js"></script>
    <script>
        // ===== SUPABASE SETUP =====
        const SUPABASE_URL = "https://ddubjpmuomforwickzyb.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkdWJqcG11b21mb3J3aWNrenliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTI0ODMsImV4cCI6MjA4ODE2ODQ4M30.wOiDepkS64pRFEpul_sKJ9MIVIVTWzg8BZ1fMTOK3_U";
        
        // Guard: if Supabase CDN failed to load, app still works (no login/sync)
        let supabaseClient = null;
        let currentUserId = null;
        let isLoggedIn = false;
        try {
            const { createClient } = supabase;
            supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY, {
                auth: { flowType: 'pkce' }
            });
        } catch(e) {
            console.warn('Supabase not available — running in offline mode:', e.message);
        }

        // ===== AUTHENTICATION FUNCTIONS =====
        async function handleGoogleLogin() {
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: 'https://typescripture.com' }
                });
                if (error) throw error;
            } catch (err) {
                console.error('Google login error:', err);
                alert('Error: ' + err.message);
            }
        }

        async function handleLogout() {
            try {
                await supabaseClient.auth.signOut();
                currentUserId = null;
                isLoggedIn = false;
                document.getElementById('google-login-btn').style.display = 'flex';
                document.getElementById('logout-btn').style.display = 'none';
                document.getElementById('user-email').innerText = '';
                currentUsername = null;
                // Clear cached progress so next user starts clean
                localStorage.removeItem('typeScriptureProgressSet');
                localStorage.removeItem('typeScriptureUserId');
                completedSet = new Set();
                updateBibleProgress();
                updateBooks();
            } catch (err) {
                console.error('Logout error:', err);
                alert('Error logging out: ' + err.message);
            }
        }

        // Check authentication on page load
        let currentBookmark = false;

        async function loadBookmarkState() {
            if (!currentUserId || !supabaseClient) {
                document.getElementById('bookmark-btn').classList.remove('bookmarked');
                currentBookmark = false;
                return;
            }
            const bookName = document.getElementById('book-select').value.replace(' ✅', '');
            const chapNum = parseInt(document.getElementById('chapter-select').value);
            const verseNum = parseInt(document.getElementById('verse-select').value) + 1;
            if (!bookName || !chapNum || !verseNum) return;
            const { data } = await supabaseClient.from('bookmarks').select('id')
                .eq('user_id', currentUserId).eq('book_name', bookName)
                .eq('chapter_num', chapNum).eq('verse_num', verseNum).maybeSingle();
            currentBookmark = !!data;
            const btn = document.getElementById('bookmark-btn');
            btn.classList.toggle('bookmarked', currentBookmark);
            btn.title = currentBookmark ? 'Remove bookmark' : 'Bookmark this verse';
        }

        async function toggleBookmark() {
            if (!currentUserId) { alert('Sign in to bookmark verses!'); return; }
            const bookName = document.getElementById('book-select').value.replace(' ✅', '');
            const chapNum = parseInt(document.getElementById('chapter-select').value);
            const verseNum = parseInt(document.getElementById('verse-select').value) + 1;
            if (!bookName || !chapNum || !verseNum) return;
            if (currentBookmark) {
                await supabaseClient.from('bookmarks').delete()
                    .eq('user_id', currentUserId).eq('book_name', bookName)
                    .eq('chapter_num', chapNum).eq('verse_num', verseNum);
            } else {
                await supabaseClient.from('bookmarks').insert({
                    user_id: currentUserId, book_name: bookName,
                    chapter_num: chapNum, verse_num: verseNum
                });
            }
            currentBookmark = !currentBookmark;
            const btn = document.getElementById('bookmark-btn');
            btn.classList.toggle('bookmarked', currentBookmark);
            btn.title = currentBookmark ? 'Remove bookmark' : 'Bookmark this verse';
        }

        async function checkAuth() {
            // Handle PKCE magic link redirect (?code= in URL)
            const params = new URLSearchParams(window.location.search);
            if (params.get('code')) {
                const { error } = await supabaseClient?.auth.exchangeCodeForSession(window.location.href);
                if (!error) {
                    window.history.replaceState({}, document.title, window.location.pathname);
                } else {
                    console.error('Code exchange error:', error);
                }
            }

            if (!supabaseClient) return;
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUserId = session.user.id;
                isLoggedIn = true;
                document.getElementById('google-login-btn').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'block';
                await loadUserProgress();
                await checkAndPromptUsername(session.user.id);
                console.log('✓ User logged in:', session.user.email);
            } else {
                console.log('ℹ No user session');
            }
        }

        // (checkAuth and onAuthStateChange moved to bottom, after all variables/functions are declared)

        // ===== USERNAME FUNCTIONS =====
        let currentUsername = null;

        async function fetchUsername(userId) {
            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('username')
                    .eq('id', userId)
                    .maybeSingle();
                if (error) throw error;
                return data?.username || null;
            } catch (err) {
                console.error('Error fetching username:', err);
                return null;
            }
        }

        async function saveUsername() {
            const input = document.getElementById('username-input').value.trim();
            const errorEl = document.getElementById('username-error');
            errorEl.innerText = '';
            if (!input) { errorEl.innerText = 'Please enter a username.'; return; }
            if (input.length < 3) { errorEl.innerText = 'At least 3 characters required.'; return; }
            if (!/^[a-zA-Z0-9_]+$/.test(input)) { errorEl.innerText = 'Letters, numbers, and underscores only.'; return; }
            try {
                const { error } = await supabaseClient
                    .from('profiles')
                    .insert({ id: currentUserId, username: input });
                if (error) {
                    if (error.code === '23505') { errorEl.innerText = 'That username is taken — try another.'; }
                    else throw error;
                    return;
                }
                currentUsername = input;
                document.getElementById('username-modal').classList.remove('active');
                document.getElementById('user-email').innerText = '✓ ' + currentUsername;
            } catch (err) {
                console.error('Error saving username:', err);
                errorEl.innerText = 'Something went wrong. Try again.';
            }
        }

        async function checkAndPromptUsername(userId) {
            const username = await fetchUsername(userId);
            if (username) {
                currentUsername = username;
                document.getElementById('user-email').innerText = '✓ ' + currentUsername;
            } else {
                document.getElementById('username-modal').classList.add('active');
            }
        }



        // Load user progress from Supabase
        async function loadUserProgress() {
            if (!currentUserId) return;

            try {
                console.log('Loading progress for user:', currentUserId);
                const { data, error } = await supabaseClient
                    .from('verse_progress')
                    .select('*')
                    .eq('user_id', currentUserId);

                if (error) throw error;

                if (data) {
                    console.log('Loaded', data.length, 'completed verses from Supabase');
                    // Always replace completedSet with exactly what's in the DB for this user
                    completedSet = new Set();
                    data.forEach(record => {
                        const key = `KJV_${record.book_name}_${record.chapter_num}_${record.verse_num}`;
                        completedSet.add(key);
                    });
                    // Cache with the current user id so we can detect user switches
                    localStorage.setItem('typeScriptureProgressSet', JSON.stringify(Array.from(completedSet)));
                    localStorage.setItem('typeScriptureUserId', currentUserId);
                }

                updateBooks();
                updateBibleProgress();
            } catch (err) {
                console.error('Error loading progress from Supabase:', err);
                // Fall back to localStorage
                completedSet = new Set(JSON.parse(localStorage.getItem('typeScriptureProgressSet')) || []);
                updateBooks();
                updateBibleProgress();
            }
        }

        // Save verse to Supabase database
        async function saveVerseToDatabase(bookName, chapNum, verseNum, wpm) {
            if (!currentUserId) {
                console.log('Not logged in - skipping Supabase save (using localStorage only)');
                return;
            }

            try {
                console.log('Saving to Supabase:', { bookName, chapNum, verseNum, wpm, userId: currentUserId });
                
                const { data, error } = await supabaseClient
                    .from('verse_progress')
                    .upsert({
                        user_id: currentUserId,
                        book_name: bookName,
                        chapter_num: chapNum,
                        verse_num: verseNum,
                        best_wpm: wpm,
                        completed: true,
                        completed_at: new Date().toISOString()
                    }, { 
                        onConflict: 'user_id,book_name,chapter_num,verse_num'
                    });

                if (error) {
                    console.error('❌ Supabase upsert error:', error);
                    if (error.code === '42501') {
                        console.error('→ RLS policy blocking write. In Supabase: Authentication > Policies > verse_progress, add INSERT and UPDATE policies for authenticated users.');
                    }
                    throw error;
                }
                console.log('✓ Saved to Supabase:', bookName, chapNum + ':' + verseNum, '- WPM:', wpm);
            } catch (err) {
                console.error('❌ Error saving verse to database:', err);
            }
        }

        // Get best WPM from database
        async function getBestWpmFromDatabase(bookName, chapNum, verseNum) {
            if (!currentUserId) return 0;

            try {
                const { data, error } = await supabaseClient
                    .from('verse_progress')
                    .select('best_wpm')
                    .eq('user_id', currentUserId)
                    .eq('book_name', bookName)
                    .eq('chapter_num', chapNum)
                    .eq('verse_num', verseNum)
                    .maybeSingle(); // maybeSingle returns null instead of 406 error when no row exists

                if (error) throw error;
                return data?.best_wpm || 0;
            } catch (err) {
                return 0;
            }
        }

        // ===== ORIGINAL CODE =====
        const books = ["Genesis","Exodus","Leviticus","Numbers","Deuteronomy","Joshua","Judges","Ruth","1 Samuel","2 Samuel","1 Kings","2 Kings","1 Chronicles","2 Chronicles","Ezra","Nehemiah","Esther","Job","Psalms","Proverbs","Ecclesiastes","Song of Solomon","Isaiah","Jeremiah","Lamentations","Ezekiel","Daniel","Hosea","Joel","Amos","Obadiah","Jonah","Micah","Nahum","Habakkuk","Zephaniah","Haggai","Zechariah","Malachi","Matthew","Mark","Luke","John","Acts","Romans","1 Corinthians","2 Corinthians","Galatians","Ephesians","Philippians","Colossians","1 Thessalonians","2 Thessalonians","1 Timothy","2 Timothy","Titus","Philemon","Hebrews","James","1 Peter","2 Peter","1 John","2 John","3 John","Jude","Revelation"];
        const chapCounts = [50,40,27,36,34,24,21,4,31,24,22,25,29,36,10,13,10,42,150,31,12,8,66,52,5,48,12,14,3,9,1,4,7,3,3,3,2,14,4,28,16,24,21,28,16,16,13,6,6,4,4,5,3,6,4,3,1,13,5,5,3,5,1,1,1,22];
        const TOTAL_VERSES_BIBLE = 31102;

// Bible data loaded from bible.js
        let completedSet = new Set(); // will be populated after auth check
        let currentVerses = [], currentIndex = 0, activeVerseText = "";
        let verseStartTime = null, verseWpms = [];

        const bookSel = document.getElementById('book-select');
        const chapSel = document.getElementById('chapter-select');
        const verseSel = document.getElementById('verse-select');
        const displayEl = document.getElementById('display');
        const inputEl = document.getElementById('hidden-input');
        const warningEl = document.getElementById('accuracy-warning');

        function updateBibleProgress() {
            const progress = (completedSet.size / TOTAL_VERSES_BIBLE) * 100;
            const minVisible = completedSet.size > 0 ? Math.max(progress, 0.3) : 0;
            document.getElementById('bible-progress-fill').style.width = minVisible + '%';
            const display = progress < 0.1 ? progress.toFixed(3) : progress < 1 ? progress.toFixed(2) : Math.round(progress);
            document.getElementById('progress-text').innerText = `Bible Completion: ${completedSet.size} / ${TOTAL_VERSES_BIBLE} verses (${display}%)`;
        }

        function isBookComplete(bookName) {
            const bookEntry = KJV_EMBEDDED.books.find(b => b.name === bookName);
            if (!bookEntry) return false;
            for (const chap of bookEntry.chapters) {
                for (const v of chap.verses) {
                    if (!completedSet.has(`KJV_${bookName}_${chap.chapter}_${v.verse}`)) return false;
                }
            }
            return bookEntry.chapters.length > 0;
        }

        function isChapterComplete(bookName, chapNum) {
            const bookEntry = KJV_EMBEDDED.books.find(b => b.name === bookName);
            if (!bookEntry) return false;
            const chap = bookEntry.chapters.find(c => c.chapter === chapNum);
            if (!chap || chap.verses.length === 0) return false;
            return chap.verses.every(v => completedSet.has(`KJV_${bookName}_${chapNum}_${v.verse}`));
        }

        function updateBooks() {
            const savedBook = bookSel.value; // preserve current selection
            bookSel.innerHTML = '';
            books.forEach(book => {
                let opt = document.createElement('option');
                opt.value = book;
                opt.innerText = book + (isBookComplete(book) ? " ✅" : "");
                bookSel.appendChild(opt);
            });
            if (savedBook) bookSel.value = savedBook; // restore selection
            updateChapters();
        }

        function updateChapters(autoLoad = false) {
            const savedChap = chapSel.value; // preserve current selection
            chapSel.innerHTML = '';
            const bookName = bookSel.value.replace(" ✅", "");
            const chapCount = chapCounts[books.indexOf(bookName)] || 1;
            for (let i = 1; i <= chapCount; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerText = `Chapter ${i}` + (isChapterComplete(bookName, i) ? " ✅" : "");
                chapSel.appendChild(opt);
            }
            if (savedChap && parseInt(savedChap) <= chapCount) chapSel.value = savedChap; // restore selection
            updateVerses(autoLoad);
        }

        function updateVerses(autoLoad = false) {
            verseSel.innerHTML = '';
            const bookName = bookSel.value.replace(" ✅", "");
            const chapNum = parseInt(chapSel.value);
            const currentVerseIdx = verseSel.value;
            const bookEntry = KJV_EMBEDDED.books.find(b => b.name === bookName);
            if (bookEntry) {
                const chapterObj = bookEntry.chapters.find(c => c.chapter === chapNum);
                if (chapterObj) {
                    chapterObj.verses.forEach((v, i) => {
                        const verseKey = `KJV_${bookName}_${chapNum}_${v.verse}`;
                        let opt = document.createElement('option');
                        opt.value = i;
                        opt.innerText = `Verse ${v.verse}${completedSet.has(verseKey) ? " ✅" : ""}`;
                        verseSel.appendChild(opt);
                    });
                }
            }
            if(currentVerseIdx && verseSel.options[currentVerseIdx]) verseSel.value = currentVerseIdx;
            if (autoLoad) fetchVerses();
        }

        async function fetchVerses() {
            const bookName = bookSel.value.replace(" ✅", "");
            const chapNum = parseInt(chapSel.value);
            const isEasy = document.getElementById('easy-mode').checked;
            try {
                const bookEntry = KJV_EMBEDDED.books.find(b => b.name === bookName);
                const chapterObj = bookEntry.chapters.find(c => c.chapter === chapNum);
                currentVerses = chapterObj.verses.map(v => {
                    let clean = v.text.replace(/<[^>]*>/g, '').trim().replace(/[""]/g, '"').replace(/['']/g, "'");
                    return isEasy ? clean.toLowerCase().replace(/[^a-z0-9\s]/gi, '') : clean;
                });
                currentIndex = parseInt(verseSel.value) || 0;
                verseWpms = [];
                loadVerse();
            } catch (e) { displayEl.innerText = "Sample Data: Try Genesis 1 or Psalms 117."; }
        }

        function showChapterComplete() {
            const avg = verseWpms.length > 0 ? Math.round(verseWpms.reduce((a, b) => a + b, 0) / verseWpms.length) : 0;
            const bookName = bookSel.value.replace(" ✅", "");
            const chapNum = parseInt(chapSel.value);
            const totalChaps = chapCounts[books.indexOf(bookName)] || 1;
            const hasNext = chapNum < totalChaps;

            displayEl.innerHTML = `
                <div class="complete-screen">
                    <div class="emoji">🎉</div>
                    <h2>Chapter ${chapNum} Complete!</h2>
                    <div class="avg">Average WPM this chapter: <strong>${avg}</strong></div>
                    ${hasNext
                        ? `<button class="next-btn" onclick="goToNextChapter()">Next Chapter →</button>`
                        : `<div style="color:var(--text-muted);font-size:0.9em;">You've reached the end of ${bookName}!</div>`
                    }
                </div>`;
        }

        function goToNextChapter() {
            const bookName = bookSel.value.replace(" ✅", "");
            const currentChap = parseInt(chapSel.value);
            const totalChaps = chapCounts[books.indexOf(bookName)] || 1;
            
            if (currentChap < totalChaps) {
                chapSel.value = currentChap + 1;
                updateVerses();
                fetchVerses();
            }
        }

        function goToNextVerse() {
            const bookName = bookSel.value.replace(" ✅", "");
            const bookIdx = books.indexOf(bookName);
            let chapNum = parseInt(chapSel.value);
            let verseIdx = parseInt(verseSel.value); // 0-indexed

            const totalVerses = verseCounts[bookName][chapNum - 1];
            const totalChaps = chapCounts[bookIdx];

            if (verseIdx + 1 < totalVerses) {
                // Next verse in same chapter
                verseSel.value = verseIdx + 1;
                fetchVerses();
            } else if (chapNum < totalChaps) {
                // First verse of next chapter
                chapSel.value = chapNum + 1;
                updateVerses();
                verseSel.value = 0;
                fetchVerses();
            } else if (bookIdx + 1 < books.length) {
                // First verse of next book
                bookSel.value = books[bookIdx + 1];
                updateChapters();
                chapSel.value = 1;
                updateVerses();
                verseSel.value = 0;
                fetchVerses();
            }
            // If at very end (Revelation 22:21), do nothing
        }

        function showLastVerse(wpm, accuracy, isNewBest) {
            const box = document.getElementById('last-verse-box');
            box.innerHTML = 'Last verse: <span>' + wpm + ' WPM</span> · <span>' + accuracy + '% Acc</span>' + (isNewBest ? ' · <span class="new-best">New Best!</span>' : '');
            box.style.display = 'block';
        }

        async function loadVerse() {
            if (currentIndex >= currentVerses.length) {
                showChapterComplete();
                return;
            }
            activeVerseText = currentVerses[currentIndex];
            verseSel.value = currentIndex;

            const bookName = bookSel.value.replace(" ✅", "");
            const chapNum = parseInt(chapSel.value);
            const verseNum = currentIndex + 1;
            const vKey = `best_KJV_${bookName}_${chapNum}_${verseNum}`;
            
            // Try database first if logged in, then localStorage
            let bestWpm = localStorage.getItem(vKey) || 0;
            if (currentUserId) {
                const dbWpm = await getBestWpmFromDatabase(bookName, chapNum, verseNum);
                if (dbWpm > 0) bestWpm = dbWpm;
            }
            document.getElementById('verse-best-display').innerText = bestWpm;
            document.getElementById('progress').innerText = `${currentIndex + 1}/${currentVerses.length}`;

            warningEl.innerText = "";
            renderDisplay("");
            inputEl.value = "";
            verseStartTime = null;
            displayEl.scrollTop = 0;
            document.getElementById('accuracy').innerText = '100';
            inputEl.focus({ preventScroll: true });
            loadBookmarkState();
        }

        function renderDisplay(typed) {
            displayEl.innerHTML = activeVerseText.split('').map((char, i) => {
                let className = (i < typed.length) ? (typed[i] === activeVerseText[i] ? "correct" : "incorrect") : (i === typed.length ? "current-char" : "");
                return `<span class="${className}">${char}</span>`;
            }).join('');

            const cursor = document.querySelector('.current-char');
            if (cursor) {
                const parentRect = displayEl.getBoundingClientRect();
                const cursorRect = cursor.getBoundingClientRect();
                if (cursorRect.bottom > parentRect.bottom || cursorRect.top < parentRect.top) {
                    cursor.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        inputEl.addEventListener('input', () => {
            if (!verseStartTime) verseStartTime = new Date();
            const typed = inputEl.value;
            renderDisplay(typed);

            const mins = (new Date() - verseStartTime) / 60000;
            const wpm = Math.round((typed.length / 5) / mins) || 0;
            document.getElementById('wpm').innerText = wpm;

            const correctChars = typed.split('').filter((ch, i) => ch === activeVerseText[i]).length;
            const accuracy = typed.length > 0 ? Math.round((correctChars / typed.length) * 100) : 100;
            document.getElementById('accuracy').innerText = accuracy;

            if (typed.length >= activeVerseText.length && activeVerseText.length > 0) {
                warningEl.innerText = "";
                verseWpms.push(wpm);
                const bookName = bookSel.value.replace(" ✅", "");
                const chapNum = parseInt(chapSel.value);
                const verseNum = currentIndex + 1;
                const vKey = `best_KJV_${bookName}_${chapNum}_${verseNum}`;
                const currentBestWpm = parseInt(document.getElementById('verse-best-display').innerText) || 0;

                // Only save highscore if accuracy is 100%
                let isNewBest = false;
                if (accuracy === 100) {
                    const newBestWpm = Math.max(wpm, currentBestWpm);
                    if (newBestWpm > currentBestWpm) {
                        isNewBest = true;
                        saveVerseToDatabase(bookName, chapNum, verseNum, newBestWpm);
                        localStorage.setItem(vKey, newBestWpm);
                        document.getElementById("verse-best-display").innerText = newBestWpm;
                    }
                }
                showLastVerse(wpm, accuracy, isNewBest);

                // Only count verse as completed if accuracy >= 50%
                if (accuracy >= 50) {
                    completedSet.add(`KJV_${bookName}_${chapNum}_${verseNum}`);
                    localStorage.setItem('typeScriptureProgressSet', JSON.stringify(Array.from(completedSet)));
                    if (currentUserId) {
                        supabaseClient?.from('verse_progress').upsert({
                            user_id: currentUserId,
                            book_name: bookName,
                            chapter_num: chapNum,
                            verse_num: verseNum,
                            best_wpm: 0,
                            completed: true,
                            completed_at: new Date().toISOString()
                        }, { onConflict: 'user_id,book_name,chapter_num,verse_num',
                             ignoreDuplicates: true });
                    }
                    updateBibleProgress();
                    updateBooks();
                } else {
                    warningEl.innerText = 'Accuracy too low — verse not counted. Try again!';
                }
                if (!document.getElementById('repeat-mode').checked) currentIndex++;
                setTimeout(loadVerse, 100);
            }
        });

        window.addEventListener('click', (e) => {
            if (!['SELECT', 'BUTTON', 'INPUT'].includes(e.target.tagName)) inputEl.focus({ preventScroll: true });
        });

        // Check for URL params (e.g. from bookmarks page)
        const urlParams = new URLSearchParams(window.location.search);
        const urlBook = urlParams.get('book');
        const urlChapter = urlParams.get('chapter');
        const urlVerse = urlParams.get('verse');

        updateBooks();

        if (urlBook && urlChapter && urlVerse) {
            // Set book
            const bookSel2 = document.getElementById('book-select');
            for (let i = 0; i < bookSel2.options.length; i++) {
                if (bookSel2.options[i].value.replace(' ✅','') === urlBook) {
                    bookSel2.selectedIndex = i; break;
                }
            }
            updateChapters();
            // Set chapter
            const chapSel2 = document.getElementById('chapter-select');
            for (let i = 0; i < chapSel2.options.length; i++) {
                if (chapSel2.options[i].value === urlChapter) {
                    chapSel2.selectedIndex = i; break;
                }
            }
            updateVerses();
            // Set verse (verse-select is 0-indexed)
            const verseSel2 = document.getElementById('verse-select');
            for (let i = 0; i < verseSel2.options.length; i++) {
                if (parseInt(verseSel2.options[i].value) === parseInt(urlVerse) - 1) {
                    verseSel2.selectedIndex = i; break;
                }
            }
            // Clean URL without reloading
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        fetchVerses();

        // Auth init — runs after all variables and functions are declared
        checkAuth();

        if (supabaseClient) supabaseClient.auth.onAuthStateChange((event, session) => {
            // Clean up magic link hash after Supabase reads it
            if (event === 'SIGNED_IN' && window.location.hash) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            if (session) {
                currentUserId = session.user.id;
                isLoggedIn = true;
                document.getElementById('google-login-btn').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'block';
                loadUserProgress();
                checkAndPromptUsername(session.user.id);
                console.log('✓ Auth state changed - user logged in:', session.user.email);
            } else {
                currentUserId = null;
                isLoggedIn = false;
                console.log('ℹ Auth state changed - user logged out');
            }
        });
    </script>
</body>
</html>
